<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إنصاف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0a5a2f; --primary-light: #2d8a3e; --accent: #c9a227; --bg-light: #f8f9fa; --text-dark: #1a202c; --text-light: #6b7280; --white: #ffffff; --error: #dc3545; --border: #dee2e6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--primary); padding: 0.9rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo img { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; }
        .logo-text { color: var(--white); font-size: 1.6rem; font-weight: 800; }
        .logo-slogan { color: rgba(255,255,255,0.85); font-size: 0.85rem; display: block; font-weight: 400; }
        .header-info { color: rgba(255,255,255,0.9); font-size: 0.85rem; display: flex; gap: 1.2rem; align-items: center; }
        .header-info span { display: inline-flex; align-items: center; gap: 5px; }
        .required-star { color: var(--error); font-weight: 700; margin-right: 3px; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
        .auth-card { background: var(--white); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding: 2.5rem; width: 100%; max-width: 440px; }
        .auth-card h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 0.4rem; text-align: center; }
        .auth-card .sub { text-align: center; color: var(--text-light); margin-bottom: 2rem; font-size: 0.95rem; }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.4rem; font-size: 0.92rem; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 1rem; font-family: 'Tajawal', sans-serif; }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(10,90,47,0.1); }
        .btn-submit { width: 100%; background: var(--primary); color: var(--white); padding: 13px; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 600; cursor: pointer; font-family: 'Tajawal', sans-serif; transition: background 0.2s; }
        .btn-submit:hover { background: var(--primary-light); }
        .error-box { background: #fee; color: var(--error); padding: 10px 14px; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; border: 1px solid #fcc; }
        .auth-footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.92rem; color: var(--text-light); }
        .auth-footer-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .footer { background: var(--primary); color: var(--white); padding: 1.4rem 2rem; text-align: center; }
        .footer a { color: rgba(255,255,255,0.9); text-decoration: none; margin: 0 0.8rem; }
        .footer a:hover { color: #fff; text-decoration: underline; }
        .footer .small { opacity: 0.75; font-size: 0.85rem; margin-top: 0.4rem; }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='ensaf-logo.jpeg') }}" alt="إنصاف">
            <div>
                <div class="logo-text">إنصاف</div>
                <span class="logo-slogan">عقود عمل ذكية وفق نظام العمل السعودي</span>
            </div>
        </a>
        <div class="header-info">
            <span>♡ Made In PSU ♡</span>
            <span>Info@ensaf.com</span>
        </div>
    </header>

    <main>
        <div class="auth-card">
            <h1>تسجيل الدخول</h1>
            <p class="sub">Login to continue</p>
            {% if error %}<div class="error-box">{{ error }}</div>{% endif %}
            <form method="POST">
                <div class="form-group">
                    <label><span class="required-star">*</span> البريد الإلكتروني / Email</label>
                    <input type="email" name="email" required autofocus>
                </div>
                <div class="form-group">
                    <label><span class="required-star">*</span> كلمة المرور / Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn-submit">دخول / Login</button>
            </form>
            <div class="auth-footer-link">
                ليس لديك حساب؟ <a href="{{ url_for('register') }}">أنشئ حساباً جديداً</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div>
            <a href="{{ url_for('about') }}">About Us</a> ·
            <a href="{{ url_for('privacy') }}">Privacy</a>
        </div>
        <div class="small">© 2026 إنصاف — Made In PSU ♡</div>
    </footer>
</body>
</html>
